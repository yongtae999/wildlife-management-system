<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wildlife Management System Simulator</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Mode Switcher (For Demo Purpose) -->
    <div id="mode-switcher">
        <button class="mode-btn active" data-mode="hunter">Hunter App</button>
        <button class="mode-btn" data-mode="official">Official Dashboard</button>
    </div>

    <!-- Hunter App Container -->
    <div id="hunter-app" class="app-container active">
        <!-- Content will be injected here -->
        <div class="mobile-frame">
            <div class="status-bar">
                <span>12:00</span>
                <div class="icons">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi"></i>
                    <i class="fas fa-battery-full"></i>
                </div>
            </div>
            <header class="app-header">
                <button class="back-btn"><i class="fas fa-arrow-left"></i></button>
                <h1>야생생물시스템</h1>
            </header>

            <main id="hunter-content">
                <!-- Safety Radar / Form / History / Detail views go here -->
            </main>

            <nav class="bottom-nav">
                <button class="nav-item active" data-target="safety"><i
                        class="fas fa-shield-alt"></i><span>안전</span></button>
                <button class="nav-item" data-target="report"><i class="fas fa-camera"></i><span>신고</span></button>
                <button class="nav-item" data-target="history"><i class="fas fa-list"></i><span>이력</span></button>
            </nav>
        </div>
    </div>

    <!-- Official Dashboard Container -->
    <div id="official-dashboard" class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-area">
                <i class="leaf-icon fas fa-leaf"></i> 야생생물시스템 관리자
            </div>
            <div class="user-profile">
                <div class="avatar">김철수</div>
                <div class="info">
                    <p class="name">김철수 (관리자)</p>
                    <p class="dept">환경과</p>
                </div>
            </div>
            <nav class="side-menu">
                <ul>
                    <li data-target="capture-reports" class="active"><i class="fas fa-list-alt"></i> 포획신고내역</li>
                    <li data-target="user-registration"><i class="fas fa-users-cog"></i> 사용자등록</li>
                    <li data-target="statistics"><i class="fas fa-chart-pie"></i> 통계</li>
                    <li data-target="notifications"><i class="fas fa-bell"></i> 알림기능</li>
                    <li data-target="settings"><i class="fas fa-cog"></i> 환경설정</li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <h2 id="page-title">포획신고내역</h2>
                <div class="header-actions">
                    <button class="icon-btn"><i class="fas fa-bell"></i></button>
                    <button class="icon-btn"><i class="fas fa-user-circle"></i></button>
                </div>
            </header>

            <div id="dashboard-content" class="content-body">
                <!-- Dashboard views go here -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
